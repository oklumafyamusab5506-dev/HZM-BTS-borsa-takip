<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HZM SYS - Yönetim Paneli{% endblock %}</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HZM Borsa">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='logo.png') }}">
    <style>
        :root { 
            --bg-color: #0c0c0d; 
            --card-bg: #141416; 
            --text-main: #f1f1f3; 
            --text-dim: #6c6e75; 
            --accent: #23252b; 
            --highlight: #ffffff; 
            --pos-color: #26a69a;
            --neg-color: #ef5350;
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding: 15px; 
            margin: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }
        /* Üst sabit barın içerikleri ezmemesi için container'a üst boşluk ekliyoruz */
        .container { max-width: 1240px; margin: auto; width: 100%; padding-top: 75px; }
        
        /* HZM SYS Sabit, Geçirgen Üst Bar (Sticky Glassmorphism) */
        .sys-header {
            position: fixed;
            top: 0;
            left: 15px;
            right: 15px;
            max-width: 1240px;
            margin: 10px auto 0 auto;
            background: rgba(20, 20, 22, 0.75);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--accent);
            border-radius: 6px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 55px;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        /* Sol Taraf: Marka & Logo Alanı */
        .sys-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            user-select: none;
        }
        /* Kırık resim ikonunu gizleyen, logo.png yüklenene kadar yedek amblemi gösteren akıllı logo kutusu */
        .sys-logo-container {
            width: 24px;
            height: 24px;
            border: 1.5px solid var(--highlight);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: transparent;
        }
        .sys-logo-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
        }
        /* Resim yoksa arkada parlayacak minimalist yedek H harfi */
        .sys-logo-fallback {
            font-size: 0.7em;
            font-weight: 900;
            color: var(--highlight);
            z-index: 1;
        }
        .sys-title {
            font-size: 0.88em;
            font-weight: 700;
            letter-spacing: 1.2px;
            color: var(--highlight);
        }

        /* Sağ Taraf: Masaüstü Navigasyon Yapısı */
        .nav-links { 
            display: flex; 
            align-items: center;
            height: 100%;
        }
        .nav-links a { 
            color: var(--text-dim); 
            text-decoration: none; 
            font-size: 0.78em; 
            font-weight: 600;
            letter-spacing: 0.8px;
            padding: 0 16px; 
            height: 100%;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
            border-left: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
        }
        .nav-links a:first-child { border-left: none; }
        .nav-links a:hover, .nav-links a.active { color: var(--highlight); }
        .nav-links a.active { background: rgba(255, 255, 255, 0.02); font-weight: 700; }
        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--highlight);
        }

        /* Mobil Hamburger Menü Butonu (Masaüstünde Gizli) */
        .menu-toggle {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.3em;
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s;
        }
        .menu-toggle:focus { outline: none; }

        /* MOBİL RESPONSIVE TASARIM VE DROPDOWN SİSTEMİ */
        @media (max-width: 768px) {
            .sys-header {
                left: 10px;
                right: 10px;
                padding: 0 15px;
                flex-wrap: wrap;
                height: auto;
                min-height: 55px;
            }
            .menu-toggle {
                display: block; /* Sadece mobilde görünür */
            }
            
            /* Mobilde Link Paneli Aşağı Doğru Açılan Şeride Dönüşür */
            .nav-links {
                display: none; /* Varsayılan kapalı */
                width: 100%;
                flex-direction: column;
                align-items: stretch;
                border-top: 1px solid var(--accent);
                padding: 5px 0 10px 0;
                margin-top: 0;
            }
            /* JS ile tetiklenecek açılma sınıfı */
            .nav-links.active {
                display: flex;
            }
            .nav-links a {
                height: 42px;
                padding: 0 10px;
                font-size: 0.82em;
                border-left: none;
                border-radius: 4px;
                margin-top: 4px;
            }
            .nav-links a.active::after {
                left: 0;
                width: 3px;
                top: 0;
                bottom: 0;
                height: auto;
            }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <!-- HZM SYS Geçirgen ve Sabit Üst Kontrol İstasyonu -->
    <header class="sys-header">
        <div class="sys-brand">
            <div class="sys-logo-container">
                <!-- logo.png varsa otomatik basar, yoksa alttaki yedek H amblemi parlar -->
                <img src="{{ url_for('static', filename='logo.png') }}" class="sys-logo-img" onerror="this.style.display='none';">
                <div class="sys-logo-fallback">H</div>
            </div>
            <span class="sys-title">HZM BTS | (Borsa Takip Sistemi)</span>
        </div>
        
        <!-- Üç Çizgili Mobil Tetikleyici Buton -->
        <button class="menu-toggle" id="menuToggleBtn" onclick="toggleMobilMenu()">☰</button>
        
        <nav class="nav-links" id="sysNavLinks">
            <a href="/" id="nav-portfolio">PORTFÖYÜM</a>
            <a href="/piyasa" id="nav-market">PİYASA PANELİ</a>
            <a href="/analiz" id="nav-analysis">TEKNİK ANALİZ</a>
            <a href="/gunluk_rapor" id="nav-daily">KIYAS ARŞİVİ</a>
            <a href="/grafik_analiz" id="nav-charts">GRAFİK İSTASYONU</a>
        </nav>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        // Mobil Hamburger Açma/Kapatma Motoru
        function toggleMobilMenu() {
            const nav = document.getElementById('sysNavLinks');
            const btn = document.getElementById('menuToggleBtn');
            nav.classList.toggle('active');
            
            // Açıldığında butonu çarpı işaretine döndür
            if(nav.classList.contains('active')) {
                btn.innerText = '✕';
                btn.style.color = 'var(--neg-color)';
            } else {
                btn.innerText = '☰';
                btn.style.color = 'var(--text-main)';
            }
        }

        // SYS Rota Takip ve Aktiflik Motoru
        const path = window.location.pathname;
        document.querySelectorAll('.nav-links a').forEach(el => el.classList.remove('active'));
        
        if (path === '/piyasa') {
            document.getElementById('nav-market').classList.add('active');
        } else if (path === '/analiz') {
            document.getElementById('nav-analysis').classList.add('active');
        } else if (path === '/gunluk_rapor') {
            document.getElementById('nav-daily').classList.add('active');
        } else if (path === '/') {
            document.getElementById('nav-portfolio').classList.add('active');
        }
        else if (path === '/grafik_analiz') {
            document.getElementById('nav-charts').classList.add('active');
        }
        function formatTL(val) {
            return new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(val);
        }

        async function hisseSil(id) {
            if (!confirm("Bu yatırımı silmek istediğinize emin misiniz?")) return;
            try {
                const response = await fetch(`/api/hisse_sil/${id}`, { method: 'DELETE' });
                if (response.ok) window.location.reload();
            } catch (error) {
                alert("Silme işlemi başarısız.");
            }
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
